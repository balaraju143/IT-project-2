<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      max-width: 400px;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    p {
      color: gray;
      margin: 15px 0;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>404</h1>
  <p>Oops! Page not found.</p>

  <a href="index.html" class="btn">🏠 Back to Home</a>
  <button onclick="goBack()" class="btn">⬅ Go Back</button>
</div>

<script>
function goBack() {
  window.history.back();
}
</script>

</body>
</html>
