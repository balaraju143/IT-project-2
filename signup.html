<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup - Stackly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="login-page">

<div class="login-container">

  <!-- LOGO -->
  <img src="images/logo.png" class="login-logo">

  <h2>Create Account</h2>
  <p>Register to get started</p>

  <!-- EMAIL -->
  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Email Address">
  </div>

  <!-- PASSWORD -->
  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Password">
  </div>

  <!-- ROLE -->
  <div class="input-box">
    <i class="fa fa-users"></i>
    <select id="role">
      <option value="">Select Role</option>
      <option value="employee">Employee</option>
      <option value="admin">Admin</option>
    </select>
  </div>

  <!-- BUTTON -->
  <button onclick="signup()" class="login-btn-main">
    Create Account <i class="fa fa-arrow-right"></i>
  </button>

  <!-- LINKS -->
  <p class="bottom-text">
    Already have an account? <a href="login.html">Login</a>
  </p>

  <p class="back-home">
    <a href="index.html"><i class="fa fa-arrow-left"></i> Back to Home</a>
  </p>

</div>

<script src="script.js"></script>
</body>
</html>
